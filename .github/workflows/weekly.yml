name: Weekly Briefing Auto-Update

on:
  schedule:
    # 매주 월요일 08:10 KST = 일요일 23:10 UTC
    # KST(UTC+9) → UTC 변환: 08:10 - 9h = 전날 23:10
    - cron: '10 23 * * 0'
  workflow_dispatch:
    inputs:
      week_override:
        description: '특정 주차로 강제 생성 (예: 22). 비우면 자동 계산.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly update
        env:
          TZ: Asia/Seoul
          WEEK_OVERRIDE: ${{ github.event.inputs.week_override }}
        run: python scripts/update_weekly.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          WEEK=$(date -u -d 'last sunday' +%V 2>/dev/null || date +%V)
          git commit -m "Auto-update: weekly briefing ${WEEK}w (run $(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
