name: Weekly Briefing Auto-Update

on:
  schedule:
    # 매주 월요일 08:10 KST = 일요일 23:10 UTC
    - cron: '10 23 * * 0'
  workflow_dispatch:
    inputs:
      week_override:
        description: '특정 주차로 강제 생성 (예 22). 비우면 자동 계산.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly update
        env:
          TZ: Asia/Seoul
          WEEK_OVERRIDE: ${{ github.event.inputs.week_override }}
        run: python scripts/update_weekly.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          # Python이 기록한 last_run.json에서 정확한 주차 번호 읽기
          WEEK=$(python3 -c "import json; print(json.load(open('data/last_run.json'))['week'])" 2>/dev/null || echo "unknown")
