name: Weekly Briefing Auto-Update

on:
  schedule:
    - cron: '10 23 * * 0'
  workflow_dispatch:
    inputs:
      week_override:
        description: 'Force a specific week number (e.g. 22). Leave empty for auto.'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly update
        env:
          TZ: Asia/Seoul
          WEEK_OVERRIDE: ${{ github.event.inputs.week_override }}
        run: python -u scripts/update_weekly.py

      - name: Debug - list files after Python
        run: |
          echo "=== docs/ ==="
          ls -la docs/ || true
          echo "=== data/ ==="
          ls -la data/ || true
          echo "=== git status ==="
          git status --short

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto-update weekly briefing"
          git push origin main
